name: Deploy Static Project ( Vue 3 + Vite + GitHub Pages )
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        steps:
            # Checkout the repository
            - name: Checkout Repository
              uses: actions/checkout@v7

            # Setup Node.js
            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                node-version: '24'
    
            - name: Install Dependencies
              run: npm install
    
            - name: Build Project
              run: npm run build
    
            - name: Deploy
              uses: peaceiris/actions-gh-pages@v4
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: ./dist